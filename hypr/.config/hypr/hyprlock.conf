background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.012
    contrast = 0.88
    brightness = 0.60
    vibrancy = 0.30
}

label {
    monitor =
    text = $TIME
    color = rgba(232, 232, 235, 1.0)
    font_size = 110
    font_family = Geist Bold
    position = 0, -100
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %B %d, %Y")"
    color = rgba(181, 181, 184, 0.85)
    font_size = 20
    font_family = Geist Semibold
    position = 0, -260
    halign = center
    valign = top
}

input-field {
    monitor =
    size = 280, 48 
    outline_thickness = 1
    dots_size = 0.32
    dots_spacing = 0.40
    dots_center = true

    outer_color = rgba(69, 69, 70, 0.4)
    inner_color = rgba(17, 18, 20, 0.75)
    font_color = rgba(232, 232, 235, 1.0)

    check_color = rgba(181, 181, 184, 0.75)
    fail_color = rgba(255, 51, 51, 1.0)

    fade_on_empty = false

    placeholder_text = <span font_family="Geist" size="14000" foreground="##b5b5b8">Enter Password</span>
    hide_input = false

    rounding = 24 

    fail_text = <span font_family="Geist" size="14000"><i>$FAIL <b>($ATTEMPTS)</b></i></span>
    fail_transition = 150

    position = 0, 200
    halign = center
    valign = bottom
}
